name: Autoformat

on:
  push:
    branches:
      - spotless_testing
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
            
    steps:

      - name: clang-format lint
        uses: DoozyX/clang-format-lint-action@v0.9
        with:
          source: './main'
          extensions: 'h,cpp,c,ino'
          clangFormatVersion: 16
          inplace: True
 
